const getToday = () => { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); };
const toLocalDate = (d) => d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
const getWeekKey = () => {
  const d = new Date();
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const wk = Math.ceil(((d - jan1) / 864e5 + jan1.getDay() + 1) / 7);
  return d.getFullYear() + "-W" + wk;
};
const getMonthKey = () => {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
};
const fmtMoney = (n) => (!n && n !== 0) ? "$0" : (n < 0 ? "-$" : "$") + Math.abs(n).toLocaleString("en-US", { maximumFractionDigits: 0 });
const fmtShort = (n) => {
  if (!n && n !== 0) return "$0";
  const a = Math.abs(n), s = n < 0 ? "-" : "";
  if (a >= 1e6) return s + "$" + (a / 1e6).toFixed(1) + "M";
  if (a >= 1e3) return s + "$" + (a / 1e3).toFixed(1) + "K";
  return s + "$" + a.toFixed(0);
};

function useStorage() {
  const [data, setData] = useState(defaultData);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    (async () => {
      try {
        const r = localStorage.getItem("cc-v5");
        if (r) setData({ ...defaultData, ...JSON.parse(r) });
      } catch (e) {
        // Try to recover from rolling backups
        for (let i = 1; i <= 3; i++) {
          try {
            const b = localStorage.getItem("cc-v5-backup-" + i);
            if (b) { setData({ ...defaultData, ...JSON.parse(b) }); break; }
          } catch (e2) {}
        }
      }
      setLoaded(true);
    })();
  }, []);
  const saveCount = useRef(0);
  const save = useCallback(async (nd) => {
    setData(nd);
    try { localStorage.setItem("cc-v5", JSON.stringify(nd)); } catch (e) {}
    // Rolling backup every 10 saves
    saveCount.current++;
    if (saveCount.current % 10 === 0) {
      const slot = ((saveCount.current / 10) % 3) + 1;
      try { localStorage.setItem("cc-v5-backup-" + slot, JSON.stringify(nd)); } catch (e) {}
    }
  }, []);
  return { data, save, loaded };
}

function BackupBanner({ data }) {
  const [show, setShow] = useState(false);
  const [dismissed, setDismissed] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const r = localStorage.getItem("cc-v5-last-backup");
        const lastBackup = r ? parseInt(r) : 0;
        const daysSince = (Date.now() - lastBackup) / 86400000;
        if (daysSince >= 5) setShow(true);
      } catch (e) { setShow(true); }
    })();
  }, []);

  const doBackup = async () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "command-center-backup-" + new Date().toISOString().split("T")[0] + ".json";
    a.click();
    URL.revokeObjectURL(url);
    try { localStorage.setItem("cc-v5-last-backup", String(Date.now())); } catch (e) {}
    setShow(false);
  };

  if (!show || dismissed) return null;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 16px", background: "#005A2B15", borderBottom: "1px solid #005A2B30" }}>
      <span style={{ fontSize: 13, color: "#005A2B", fontWeight: 600, flex: 1 }}>Back up your data?</span>
      <button onClick={doBackup} style={{ background: "#005A2B", color: "#fff", border: "none", borderRadius: 6, padding: "5px 12px", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", textTransform: "uppercase" }}>Save</button>
      <button onClick={() => setDismissed(true)} style={{ background: "none", border: "none", color: "#9C9C94", cursor: "pointer", fontSize: 14 }}>×</button>
    </div>
  );
}

function BackupRestore({ data, save }) {
  const fileRef = useRef(null);

  const exportData = async () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "command-center-backup-" + new Date().toISOString().split("T")[0] + ".json";
    a.click();
    URL.revokeObjectURL(url);
    try { localStorage.setItem("cc-v5-last-backup", String(Date.now())); } catch (e) {}
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        save({ ...defaultData, ...parsed });
      } catch (err) { /* invalid file */ }
    };
    reader.readAsText(file);
  };

  return (
    <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
      <button onClick={exportData} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 10, fontFamily: "inherit", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>Export</button>
      <span style={{ color: "#D6D6D0" }}>|</span>
      <button onClick={() => fileRef.current.click()} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 10, fontFamily: "inherit", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>Import</button>
      <input ref={fileRef} type="file" accept=".json" onChange={importData} style={{ display: "none" }} />
    </div>
  );
}

function calcStreak(days) {
  if (!days.length) return { current: 0, best: 0 };
  const sorted = [...new Set(days)].sort().reverse();
  const today = getToday();
  const yest = toLocalDate(new Date(Date.now() - 864e5));
  let current = 0;
  if (sorted[0] === today || sorted[0] === yest) {
    for (let i = 0; i < sorted.length; i++) {
      const exp = sorted[0] === yest
        ? toLocalDate(new Date(Date.now() - (i + 1) * 864e5))
        : toLocalDate(new Date(Date.now() - i * 864e5));
      if (sorted[i] === exp) current++; else break;
    }
  }
  let best = 0, run = 1;
  const asc = [...sorted].reverse();
  for (let i = 1; i < asc.length; i++) {
    if ((new Date(asc[i]) - new Date(asc[i - 1])) / 864e5 === 1) run++;
    else { best = Math.max(best, run); run = 1; }
  }
  return { current, best: Math.max(best, run, current) };
}

/* ══ GOOGLE CALENDAR ══ */
const calendarCache = { data: null, date: null };

function CalendarCard() {
  const [events, setEvents] = useState(calendarCache.data || []);
  const [loading, setLoading] = useState(!calendarCache.data);
  const [error, setError] = useState(null);

  const fetchEvents = async () => {
    setLoading(true);
    setError(null);
    try {
      const today = new Date();
      const todayStr = today.toDateString();

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [
            {
              role: "user",
              content: "List all my calendar events for today (" + today.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric" }) + "). Return ONLY a JSON array of objects with fields: title, startTime (HH:MM AM/PM format), endTime (HH:MM AM/PM format), location (or null). No other text, no markdown, just the JSON array. If there are no events, return an empty array []."
            }
          ],
          mcp_servers: [
            {
              type: "url",
              url: "https://gcal.mcp.claude.com/mcp",
              name: "google-calendar"
            }
          ]
        })
      });

      const data = await response.json();
      const textBlocks = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");

      let parsed = [];
      try {
        const clean = textBlocks.replace(/```json|```/g, "").trim();
        parsed = JSON.parse(clean);
        if (!Array.isArray(parsed)) parsed = [];
      } catch (parseErr) {
        const match = textBlocks.match(/\[[\s\S]*\]/);
        if (match) { try { parsed = JSON.parse(match[0]); } catch (e2) { parsed = []; } }
      }

      calendarCache.data = parsed;
      calendarCache.date = todayStr;
      setEvents(parsed);
    } catch (err) {
      setError("Could not load calendar");
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => {
    const todayStr = new Date().toDateString();
    if (!calendarCache.data || calendarCache.date !== todayStr) {
      fetchEvents();
    }
  }, []);

  const now = new Date();
  const currentTimeStr = now.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

  return (
    <Card>
      <SH title="Today's Schedule" icon="📅" action={
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 11, color: "#6E6E68", fontWeight: 500 }}>{currentTimeStr}</span>
          {!loading && <button onClick={fetchEvents} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#6E6E68", padding: 0, lineHeight: 1 }} title="Refresh">↻</button>}
        </div>
      } />
      {loading && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "16px 0", gap: 8 }}>
          <div style={{ width: 16, height: 16, border: "2px solid #D6D6D0", borderTopColor: "#005A2B", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          <span style={{ fontSize: 13, color: "#6E6E68" }}>Loading calendar...</span>
          <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        </div>
      )}
      {error && <div style={{ fontSize: 13, color: "#A85B36", textAlign: "center", padding: "12px 0" }}>{error}</div>}
      {!loading && !error && events.length === 0 && (
        <div style={{ fontSize: 13, color: "#9C9C94", textAlign: "center", padding: "12px 0", fontStyle: "italic" }}>No events scheduled for today — open day ahead!</div>
      )}
      {!loading && !error && events.length > 0 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {events.map((ev, i) => (
            <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 12px", background: "#F7F7F5", borderRadius: 10, border: "1px solid #D6D6D0", borderLeft: "3px solid #005A2B" }}>
              <div style={{ flexShrink: 0, minWidth: 64, textAlign: "right" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#005A2B" }}>{ev.startTime || ""}</div>
                {ev.endTime && <div style={{ fontSize: 10, color: "#9C9C94", marginTop: 1 }}>{ev.endTime}</div>}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#1A1A1A" }}>{ev.title || "Untitled"}</div>
                {ev.location && <div style={{ fontSize: 11, color: "#6E6E68", marginTop: 2 }}>📍 {ev.location}</div>}
              </div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

    { key: "daily", label: "Today", scopeKey: today, color: "#005A2B", bgDone: "#EBF5EE" },
    { key: "tomorrow", label: "Tomorrow", scopeKey: tomorrow, color: "#4A4A48", bgDone: "rgba(74,74,72,0.06)" },
    { key: "weekly", label: "Week", scopeKey: weekKey, color: "#4A6B8A", bgDone: "rgba(74,107,138,0.06)" },
    { key: "monthly", label: "Month", scopeKey: monthKey, color: "#8B7335", bgDone: "rgba(139,115,53,0.06)" },
  ];

  const allPrios = data.priorities || [];
  const recurring = data.recurringPriorities || [];

  // Auto-promote yesterday's "tomorrow" priorities to today's "daily"
  useEffect(() => {
    const toPromote = allPrios.filter(p => p.scope === "tomorrow" && p.scopeKey === today);
    if (toPromote.length > 0) {
      const updated = allPrios.map(p => (p.scope === "tomorrow" && p.scopeKey === today) ? { ...p, scope: "daily" } : p);
      save({ ...data, priorities: updated });
    }
  }, [today]);

  // Auto-populate recurring priorities for today
  useEffect(() => {
    const todayItems = allPrios.filter(p => p.scope === "daily" && p.scopeKey === today);
    if (todayItems.length === 0 && recurring.length > 0) {
      const dayOfWeek = new Date().getDay();
      const toAdd = recurring.filter(r => r.active !== false && (!r.days || r.days.length === 0 || r.days.includes(dayOfWeek))).slice(0, 3);
      if (toAdd.length > 0) {
        const newPrios = toAdd.map((r, i) => ({ id: Date.now() + i, text: r.text, area: r.area, done: false, scope: "daily", scopeKey: today, date: today, notes: [] }));
        save({ ...data, priorities: [...allPrios, ...newPrios] });
      }
    }
  }, [today]);

  const getItems = (scope, scopeKey) => allPrios.filter(p => p.scope === scope && p.scopeKey === scopeKey);
  const activeInfo = scopes.find(s => s.key === activeScope);
  const activeItems = getItems(activeScope, activeInfo.scopeKey);
  const activeDone = activeItems.filter(p => p.done).length;

  const add = () => {
    if (!text.trim() || activeItems.length >= 3) return;
    save({ ...data, priorities: [...allPrios, { id: Date.now(), text: text.trim(), area, done: false, scope: activeScope, scopeKey: activeInfo.scopeKey, date: today, notes: [] }] });
    setText("");
  };

  const toggle = (id) => {
    const updated = allPrios.map(p => p.id === id ? { ...p, done: !p.done } : p);
    let nd = { ...data, priorities: updated };
    const tDone = updated.filter(p => p.scope === "daily" && p.scopeKey === today && p.done).length;
    const tTotal = updated.filter(p => p.scope === "daily" && p.scopeKey === today).length;
    if (tDone === tTotal && tTotal === 3 && !(data.completedDays || []).includes(today)) {
      nd = { ...nd, completedDays: [...(data.completedDays || []), today] };
    }
    save(nd);
  };

  const remove = (id) => save({ ...data, priorities: allPrios.filter(p => p.id !== id) });

  const addNote = (id) => {
    if (!noteText.trim()) return;
    save({ ...data, priorities: allPrios.map(p => p.id === id ? { ...p, notes: [...(p.notes || []), { id: Date.now(), text: noteText.trim(), done: false }] } : p) });
    setNoteText("");
  };
  const toggleNote = (pId, nId) => save({ ...data, priorities: allPrios.map(p => p.id === pId ? { ...p, notes: (p.notes || []).map(n => n.id === nId ? { ...n, done: !n.done } : n) } : p) });
  const removeNote = (pId, nId) => save({ ...data, priorities: allPrios.map(p => p.id === pId ? { ...p, notes: (p.notes || []).filter(n => n.id !== nId) } : p) });

  return (
    <Card style={{ gap: 0, padding: 0, overflow: "hidden" }}>
      <div style={{ display: "flex", borderBottom: "1px solid #D6D6D0" }}>
        {scopes.map(s => {
          const items = getItems(s.key, s.scopeKey);
          const done = items.filter(p => p.done).length;
          const total = items.length;
          const isActive = activeScope === s.key;
          const allComplete = total === 3 && done === 3;
          return (
            <button key={s.key} onClick={() => setActiveScope(s.key)} style={{
              flex: 1, background: isActive ? "#FAFAF8" : "#F7F7F5", border: "none", borderBottom: isActive ? "2.5px solid " + s.color : "2.5px solid transparent",
              padding: "14px 8px 10px", cursor: "pointer", fontFamily: "inherit", transition: "all 0.2s",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: isActive ? s.color : "#9C9C94", textTransform: "uppercase", letterSpacing: "0.06em" }}>{s.label}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontSize: 18, fontWeight: 800, color: allComplete ? s.color : isActive ? "#1a1a1a" : "#9C9C94" }}>{done}</span>
                <span style={{ fontSize: 11, color: "#9C9C94" }}>/ {total || 0}</span>
              </div>
              <div style={{ width: "80%", marginTop: 2 }}><ProgBar pct={total > 0 ? (done / total) * 100 : 0} color={isActive ? s.color : "#D6D6D0"} /></div>
            </button>
          );
        })}
      </div>

      <div style={{ padding: "14px 18px 18px", display: "flex", flexDirection: "column", gap: 8 }}>
        {activeItems.map(p => {
          const isExp = expandedId === p.id;
          const nc = (p.notes || []).length;
          const nd = (p.notes || []).filter(n => n.done).length;
          return (
            <div key={p.id} style={{ borderRadius: 11, border: "1.5px solid " + (p.done ? activeInfo.color + "30" : "#D6D6D0"), overflow: "hidden" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 11, padding: "10px 12px", background: p.done ? activeInfo.bgDone : "#F7F7F5" }}>
                <Check checked={p.done} onClick={() => toggle(p.id)} color={activeInfo.color} size={22} />
                <span onClick={() => { setExpandedId(isExp ? null : p.id); setNoteText(""); }} style={{ fontSize: 14, fontWeight: 500, color: p.done ? "#6E6E68" : "#1a1a1a", textDecoration: p.done ? "line-through" : "none", flex: 1, cursor: "pointer" }}>{p.text}</span>
                {nc > 0 && !isExp && <span style={{ fontSize: 10, color: "#6E6E68", background: "#EFEFEC", padding: "2px 6px", borderRadius: 4, fontWeight: 600 }}>{nd}/{nc}</span>}
                <AreaBadge area={p.area} />
                <button onClick={() => remove(p.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 14 }}>×</button>
              </div>
              {isExp && (
                <div style={{ padding: "8px 12px 12px", background: "#EFEFEC", borderTop: "1px solid #D6D6D0" }}>
                  <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                    <div style={{ flex: 1 }}><Inp value={noteText} onChange={e => setNoteText(e.target.value)} placeholder="Add subtask or note..." style={{ fontSize: 12, padding: "6px 10px" }} onKeyDown={e => e.key === "Enter" && addNote(p.id)} /></div>
                    <Btn onClick={() => addNote(p.id)} primary small>+</Btn>
                  </div>
                  {(p.notes || []).map(n => (
                    <div key={n.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0" }}>
                      <Check checked={n.done} onClick={() => toggleNote(p.id, n.id)} color={activeInfo.color} size={16} />
                      <span style={{ fontSize: 12, color: n.done ? "#9C9C94" : "#3A3A3A", textDecoration: n.done ? "line-through" : "none", flex: 1 }}>{n.text}</span>
                      <button onClick={() => removeNote(p.id, n.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 11 }}>×</button>
                    </div>
                  ))}
                  {nc === 0 && <div style={{ fontSize: 11, color: "#9C9C94", fontStyle: "italic" }}>Break this down into steps</div>}
                </div>
              )}
            </div>
          );
        })}

        {activeItems.length < 3 ? (
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: activeItems.length > 0 ? 4 : 0 }}>
            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <Inp value={text} onChange={e => setText(e.target.value)} placeholder={activeInfo.label + " priority #" + (activeItems.length + 1) + "..."} onKeyDown={e => e.key === "Enter" && add()} />
              </div>
              <Btn onClick={add} primary>Add</Btn>
            </div>
            <AreaPills selected={area} onSelect={setArea} />
          </div>
        ) : (
          <div style={{ fontSize: 13, textAlign: "center", padding: "6px 0", fontWeight: 600, color: activeDone === 3 ? activeInfo.color : "#6E6E68", background: activeDone === 3 ? activeInfo.bgDone : "transparent", borderRadius: 8 }}>
            {activeDone === 3 ? "🎉 All " + activeInfo.label.toLowerCase() + " priorities complete!" : activeDone + "/3 complete"}
          </div>
        )}
      </div>
    </Card>
  );
}

/* ══ HOME PANEL ══ */
function HomePanel({ data, save, setTab }) {
  const today = getToday();

  const [dumpText, setDumpText] = useState("");
  const [dumpArea, setDumpArea] = useState("work");
  const [expandedDump, setExpandedDump] = useState(null);

  // Recurring priorities state
  const [showRec, setShowRec] = useState(false);
  const [recText, setRecText] = useState("");
  const [recArea, setRecArea] = useState("work");

  // Weekly review state
  const currentWeek = getWeekKey();
  const hasReview = (data.weeklyReviews || []).find(r => r.week === currentWeek);
  const [showReview, setShowReview] = useState(false);
  const [went, setWent] = useState(hasReview ? hasReview.wentWell : "");
  const [didnt, setDidnt] = useState(hasReview ? hasReview.didntWork : "");
  const [focus, setFocus] = useState(hasReview ? hasReview.nextFocus : "");

  // Shopping list state
  const [shopTab, setShopTab] = useState("grocery");
  const [shopText, setShopText] = useState("");
  const addDump = () => { if (!dumpText.trim()) return; const area = expandedDump || dumpArea; const catItems = (data.brainDump || []).filter(i => i.area === area); const maxOrder = catItems.reduce((m, i) => Math.max(m, i.sortOrder || 0), 0); save({ ...data, brainDump: [{ id: Date.now(), text: dumpText.trim(), area, priority: 0, sortOrder: maxOrder + 1, createdAt: new Date().toISOString() }, ...(data.brainDump || [])] }); setDumpText(""); };
  const removeDump = (id) => save({ ...data, brainDump: (data.brainDump || []).filter(i => i.id !== id) });
  const setPriority = (id, newP, area) => {
    const catItems = (data.brainDump || []).filter(i => i.area === area);
    const starsInCat = catItems.filter(i => (i.priority || 0) === 1 && i.id !== id).length;
    if (newP === 1 && starsInCat >= 3) return;
    save({ ...data, brainDump: (data.brainDump || []).map(i => i.id === id ? { ...i, priority: newP } : i) });
  };
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);
  const reorderDump = (fromId, toId, area) => {
    if (fromId === toId) return;
    const all = data.brainDump || [];
    const fromItem = all.find(i => i.id === fromId);
    const toItem = all.find(i => i.id === toId);
    if (!fromItem || !toItem || (fromItem.priority || 0) !== (toItem.priority || 0)) return;
    const rank = fromItem.priority || 0;
    const catRank = all.filter(i => i.area === area && (i.priority || 0) === rank).sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
    const fromIdx = catRank.findIndex(i => i.id === fromId);
    const toIdx = catRank.findIndex(i => i.id === toId);
    const reordered = [...catRank];
    const [moved] = reordered.splice(fromIdx, 1);
    reordered.splice(toIdx, 0, moved);
    const orderMap = {};
    reordered.forEach((item, i) => { orderMap[item.id] = i; });
    save({ ...data, brainDump: all.map(i => orderMap[i.id] !== undefined ? { ...i, sortOrder: orderMap[i.id] } : i) });
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16, paddingBottom: 20 }}>
      {/* Quote of the Day */}
      {(() => {
        const q = getTodayQuote();
        return (
          <div style={{ padding: "20px 22px", borderRadius: 10, background: "rgba(0,90,43,0.12)", border: "1.5px solid rgba(0,90,43,0.25)" }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: "#E8E8E4", lineHeight: 1.55 }}>
              "{q.text}"
            </div>
            <div style={{ fontSize: 11, fontWeight: 800, color: "#4CAF6A", marginTop: 8, textTransform: "uppercase", letterSpacing: "0.06em" }}>
              — {q.author}
            </div>
          </div>
        );
      })()}

      {/* Unified Priorities */}
      <PrioritiesCard data={data} save={save} />

      {/* Missed Priorities */}
      {(() => {
        const allPrios = data.priorities || [];
        const missed = allPrios.filter(p => !p.done && !p.dismissed && p.scope === "daily" && p.scopeKey !== today && p.scopeKey < today);
        if (missed.length === 0) return null;
        const moveToToday = (id) => {
          const todayItems = allPrios.filter(p => p.scope === "daily" && p.scopeKey === today);
          if (todayItems.length >= 3) return;
          save({ ...data, priorities: allPrios.map(p => p.id === id ? { ...p, scopeKey: today, date: today } : p) });
        };
        const dismiss = (id) => save({ ...data, priorities: allPrios.map(p => p.id === id ? { ...p, dismissed: true } : p) });
        const moveToTomorrow = (id) => {
          const tmrw = toLocalDate(new Date(Date.now() + 864e5));
          save({ ...data, priorities: allPrios.map(p => p.id === id ? { ...p, scope: "tomorrow", scopeKey: tmrw, date: today } : p) });
        };
        return (
          <Card style={{ border: "1.5px solid #C0392B30", background: "#FDF7F5" }}>
            <SH title={"Missed (" + missed.length + ")"} icon="⚠️" />
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {missed.map(p => {
                const ai = AREAS.find(a => a.key === p.area);
                const todayFull = allPrios.filter(x => x.scope === "daily" && x.scopeKey === today).length >= 3;
                return (
                  <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", background: "#FAFAF8", borderRadius: 10, border: "1px solid #D6D6D0", borderLeft: "3px solid #C0392B" }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 500, color: "#2A2A2A" }}>{p.text}</div>
                      <div style={{ fontSize: 10, color: "#9C9C94", marginTop: 2 }}>From {new Date(p.scopeKey + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" })}{ai ? " · " + ai.icon : ""}</div>
                    </div>
                    <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                      <button onClick={() => moveToToday(p.id)} disabled={todayFull} style={{ background: todayFull ? "#EFEFEC" : "#005A2B", border: "none", color: todayFull ? "#9C9C94" : "#fff", borderRadius: 6, padding: "4px 8px", fontSize: 10, fontWeight: 700, cursor: todayFull ? "default" : "pointer", fontFamily: "inherit", opacity: todayFull ? 0.5 : 1 }}>TODAY</button>
                      <button onClick={() => moveToTomorrow(p.id)} style={{ background: "#4A4A48", border: "none", color: "#fff", borderRadius: 6, padding: "4px 8px", fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>TMW</button>
                      <button onClick={() => dismiss(p.id)} style={{ background: "none", border: "1px solid #D6D6D0", color: "#9C9C94", borderRadius: 6, padding: "4px 6px", fontSize: 12, cursor: "pointer", fontFamily: "inherit" }}>×</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        );
      })()}

      {/* Brain Dump */}
      {expandedDump ? (() => {
        const a = AREAS.find(x => x.key === expandedDump);
        const items = (data.brainDump || []).filter(i => i.area === expandedDump).sort((a, b) => {
          const ap = a.priority || 0, bp = b.priority || 0;
          if (ap === 0 && bp === 0) return (a.sortOrder || 0) - (b.sortOrder || 0);
          if (ap === 0) return 1;
          if (bp === 0) return -1;
          if (ap !== bp) return ap - bp;
          return (a.sortOrder || 0) - (b.sortOrder || 0);
        });
        const starsUsed = items.filter(i => (i.priority || 0) === 1).length;
        const rankColors = { 1: "#D4A017", 2: "#1B8C4F", 3: "#2B6CB0", 4: "#D63031" };
        const rankBgs = { 1: "rgba(212,160,23,0.2)", 2: "rgba(27,140,79,0.2)", 3: "rgba(43,108,176,0.2)", 4: "rgba(214,48,49,0.2)" };
        const rankLabels = { 1: "\u2605", 2: "2", 3: "3", 4: "4" };
        return (
          <div style={{ position: "fixed", inset: 0, zIndex: 50, background: "#F7F7F5", display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "14px 18px", borderBottom: "2px solid " + a.color, background: "#FAF7F2", flexShrink: 0 }}>
              <button onClick={() => setExpandedDump(null)} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 20, color: "#6E6E68", padding: "0 4px" }}>{"\u2190"}</button>
              <span style={{ fontSize: 18 }}>{a.icon}</span>
              <span style={{ fontSize: 16, fontWeight: 900, color: a.color, textTransform: "uppercase", letterSpacing: "0.04em", flex: 1 }}>{a.label}</span>
              <span style={{ fontSize: 12, color: "#6E6E68", fontWeight: 600 }}>{items.length} {items.length === 1 ? "thought" : "thoughts"}</span>
              {starsUsed > 0 && <span style={{ fontSize: 12, color: "#D4A017", fontWeight: 700 }}>{"\u2605"} {starsUsed}/3</span>}
            </div>
            <div style={{ display: "flex", gap: 8, padding: "12px 18px", flexShrink: 0, background: "#EFEFEC" }}>
              <div style={{ flex: 1 }}><Inp value={dumpText} onChange={e => setDumpText(e.target.value)} placeholder={`Add to ${a.label}...`} onKeyDown={e => e.key === "Enter" && addDump()} /></div>
              <Btn onClick={addDump} primary>+</Btn>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "12px 18px 120px", display: "flex", flexDirection: "column", gap: 6 }}>
              {items.length === 0 && <div style={{ fontSize: 13, color: "#9C9C94", padding: "40px 0", textAlign: "center", fontStyle: "italic" }}>No thoughts yet — add one above</div>}
              {items.map(idea => {
                const p = idea.priority || 0;
                const rc = rankColors[p] || "#A8A8A0";
                const isDragging = dragId === idea.id;
                const isDragOver = dragOverId === idea.id && dragId !== idea.id;
                return (
                  <div key={idea.id}
                    draggable
                    onDragStart={(e) => { setDragId(idea.id); e.dataTransfer.effectAllowed = "move"; }}
                    onDragEnd={() => { if (dragId && dragOverId) reorderDump(dragId, dragOverId, expandedDump); setDragId(null); setDragOverId(null); }}
                    onDragOver={(e) => { e.preventDefault(); setDragOverId(idea.id); }}
                    onDragEnter={(e) => { e.preventDefault(); setDragOverId(idea.id); }}
                    onTouchStart={() => setDragId(idea.id)}
                    style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px", background: rankBgs[p] || "#FAFAF8", borderRadius: 10, border: p > 0 ? "1.5px solid " + rc + "50" : "1px solid " + (isDragOver ? "#005A2B" : "#D6D6D0"), borderLeft: `${p > 0 ? 4 : 3}px solid ${p > 0 ? rc : a.color}`, opacity: isDragging ? 0.5 : 1, borderTop: isDragOver ? "2px solid #005A2B" : undefined, transition: "opacity 0.15s", cursor: "grab" }}>
                    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 0, color: "#A8A8A0", flexShrink: 0, userSelect: "none" }}>
                      <button onClick={() => { const sameRank = items.filter(x => (x.priority || 0) === p); const idx = sameRank.findIndex(x => x.id === idea.id); if (idx > 0) reorderDump(idea.id, sameRank[idx - 1].id, expandedDump); }} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 10, padding: 0, lineHeight: 1 }}>{"\u25B2"}</button>
                      <span style={{ fontSize: 8, lineHeight: 1, cursor: "grab" }}>{"\u2807"}</span>
                      <button onClick={() => { const sameRank = items.filter(x => (x.priority || 0) === p); const idx = sameRank.findIndex(x => x.id === idea.id); if (idx < sameRank.length - 1) reorderDump(idea.id, sameRank[idx + 1].id, expandedDump); }} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 10, padding: 0, lineHeight: 1 }}>{"\u25BC"}</button>
                    </div>
                    <div style={{ display: "flex", gap: 2, flexShrink: 0 }}>
                      {[1, 2, 3, 4].map(r => {
                        const active = p === r;
                        const disabled = r === 1 && !active && starsUsed >= 3;
                        return (
                          <button key={r} onClick={() => { if (disabled) return; setPriority(idea.id, active ? 0 : r, expandedDump); }} style={{ width: 24, height: 24, borderRadius: 4, border: "1.5px solid " + (active ? rankColors[r] : disabled ? "#D6D6D0" : rankColors[r] + "40"), background: active ? rankColors[r] : "transparent", color: active ? "#fff" : disabled ? "#D6D6D0" : rankColors[r], fontSize: r === 1 ? 12 : 11, fontWeight: 800, cursor: disabled ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "inherit", opacity: disabled ? 0.4 : 1 }}>
                            {rankLabels[r]}
                          </button>
                        );
                      })}
                    </div>
                    <span style={{ fontSize: 13, color: "#2A2A2A", flex: 1, fontWeight: p === 1 ? 700 : 400 }}>{idea.text}</span>
                    <span style={{ fontSize: 10, color: "#9C9C94", flexShrink: 0 }}>{new Date(idea.createdAt).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>
                    <button onClick={() => removeDump(idea.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 16, padding: "0 2px" }}>{"\u00D7"}</button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })() : (
      <Card>
        <SH title="Brain Dump" icon={"\uD83D\uDCAD"} />
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {AREAS.filter(a => a.key !== "fitness" && a.key !== "finance" && a.key !== "house").map(a => {
            const catItems = (data.brainDump || []).filter(i => i.area === a.key);
            const count = catItems.length;
            const urgent = catItems.filter(i => (i.priority || 0) === 1).length;
            return (
              <button key={a.key} onClick={() => { setExpandedDump(a.key); setDumpText(""); }} style={{ display: "flex", alignItems: "center", gap: 10, padding: "14px 14px", background: "#F7F7F5", borderRadius: 12, border: "1px solid #D6D6D0", cursor: "pointer", fontFamily: "inherit", textAlign: "left", transition: "all 0.15s" }}>
                <div style={{ width: 36, height: 36, borderRadius: 10, background: a.color + "18", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>{a.icon}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#1A1A1A" }}>{a.label}</div>
                  <div style={{ fontSize: 11, color: "#6E6E68", marginTop: 1 }}>{count} {count === 1 ? "thought" : "thoughts"}{urgent > 0 ? " \u00B7 " : ""}{urgent > 0 && <span style={{ color: "#D4A017", fontWeight: 700 }}>{"\u2605"} {urgent}/3</span>}</div>
                </div>
                <div style={{ fontSize: 18, fontWeight: 700, color: count > 0 ? a.color : "#A8A8A0" }}>{count}</div>
              </button>
            );
          })}
        </div>
        {(!data.brainDump || data.brainDump.length === 0) && <div style={{ fontSize: 12, color: "#9C9C94", textAlign: "center", padding: "4px 0" }}>Get ideas out of your head — they are safe here.</div>}
      </Card>
      )}

      {/* Calendar */}
      {/* <CalendarCard /> — disabled temporarily */}

      {/* Recurring Priorities */}
      {(() => {
        const rec = data.recurringPriorities || [];
        const dayNames = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];

        const addRec = () => {
          if (!recText.trim()) return;
          save({ ...data, recurringPriorities: [...rec, { id: Date.now(), text: recText.trim(), area: recArea, days: [], active: true }] });
          setRecText("");
        };
        const removeRec = (id) => save({ ...data, recurringPriorities: rec.filter(r => r.id !== id) });
        const toggleDay = (id, day) => save({ ...data, recurringPriorities: rec.map(r => r.id === id ? { ...r, days: (r.days || []).includes(day) ? r.days.filter(d => d !== day) : [...(r.days || []), day] } : r) });
        const toggleActive = (id) => save({ ...data, recurringPriorities: rec.map(r => r.id === id ? { ...r, active: !r.active } : r) });

        return (
          <Card>
            <SH title="Recurring Priorities" icon="🔁" action={<Btn onClick={() => setShowRec(!showRec)}>{showRec ? "Done" : "Edit"}</Btn>} />
            {rec.length === 0 && !showRec && <div style={{ fontSize: 12, color: "#9C9C94", fontStyle: "italic", textAlign: "center" }}>Set priorities that auto-fill your Top 3 each day</div>}
            {rec.length > 0 && !showRec && (
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {rec.map(r => {
                  const ai = AREAS.find(a => a.key === r.area);
                  return (
                    <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", background: r.active ? "#F7F7F5" : "#EFEFEC", borderRadius: 8, border: "1px solid #D6D6D0", opacity: r.active ? 1 : 0.5 }}>
                      <span style={{ fontSize: 12, color: "#3A3A3A", flex: 1, fontWeight: 500 }}>{r.text}</span>
                      {ai && <span style={{ fontSize: 10, color: ai.color, fontWeight: 600 }}>{ai.icon}</span>}
                      <span style={{ fontSize: 10, color: "#9C9C94" }}>{(r.days || []).length === 0 ? "Daily" : (r.days || []).map(d => dayNames[d]).join(" ")}</span>
                    </div>
                  );
                })}
              </div>
            )}
            {showRec && (
              <>
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ flex: 1 }}><Inp value={recText} onChange={e => setRecText(e.target.value)} placeholder="Recurring priority..." style={{ fontSize: 13 }} onKeyDown={e => e.key === "Enter" && addRec()} /></div>
                  <Btn onClick={addRec} primary>+</Btn>
                </div>
                <AreaPills selected={recArea} onSelect={setRecArea} />
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {rec.map(r => (
                    <div key={r.id} style={{ padding: "10px 12px", background: "#F7F7F5", borderRadius: 8, border: "1px solid #D6D6D0" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                        <button onClick={() => toggleActive(r.id)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: r.active ? "#005A2B" : "#A8A8A0" }}>{r.active ? "✓" : "○"}</button>
                        <span style={{ fontSize: 13, flex: 1, fontWeight: 600, color: r.active ? "#1A1A1A" : "#9C9C94" }}>{r.text}</span>
                        <button onClick={() => removeRec(r.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 14 }}>×</button>
                      </div>
                      <div style={{ display: "flex", gap: 4 }}>
                        {dayNames.map((d, i) => (
                          <button key={i} onClick={() => toggleDay(r.id, i)} style={{ width: 28, height: 28, borderRadius: 6, border: "1.5px solid " + ((r.days || []).includes(i) ? "#005A2B" : "#D6D6D0"), background: (r.days || []).includes(i) ? "#005A2B" : "transparent", color: (r.days || []).includes(i) ? "#fff" : "#6E6E68", fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>{d}</button>
                        ))}
                        <span style={{ fontSize: 10, color: "#9C9C94", alignSelf: "center", marginLeft: 4 }}>{(r.days || []).length === 0 ? "Every day" : ""}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </Card>
        );
      })()}

      {/* Weekly Review */}
      {(() => {
        const reviews = data.weeklyReviews || [];

        const saveReview = () => {
          const review = { week: currentWeek, wentWell: went, didntWork: didnt, nextFocus: focus, date: getToday() };
          const updated = hasReview ? reviews.map(r => r.week === currentWeek ? review : r) : [...reviews, review];
          save({ ...data, weeklyReviews: updated });
          setShowReview(false);
        };

        const isEndOfWeek = new Date().getDay() >= 5;
        const shouldPrompt = isEndOfWeek && !hasReview;

        return (
          <Card style={shouldPrompt ? { border: "1.5px solid #005A2B40", background: "#F7FAF7" } : {}}>
            <SH title="Weekly Review" icon="📝" action={
              <Btn onClick={() => setShowReview(!showReview)}>{showReview ? "Cancel" : hasReview ? "View" : "Start"}</Btn>
            } />
            {!showReview && !hasReview && shouldPrompt && (
              <div style={{ fontSize: 13, color: "#005A2B", fontWeight: 600, textAlign: "center", padding: "4px 0" }}>Time to reflect on your week.</div>
            )}
            {!showReview && !hasReview && !shouldPrompt && (
              <div style={{ fontSize: 12, color: "#9C9C94", fontStyle: "italic", textAlign: "center" }}>Shows up Friday — take 5 min to reflect</div>
            )}
            {!showReview && hasReview && (
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {[{ label: "Went well", val: hasReview.wentWell, c: "#005A2B" }, { label: "Didn't work", val: hasReview.didntWork, c: "#A85B36" }, { label: "Next week focus", val: hasReview.nextFocus, c: "#4A6B8A" }].map(s => s.val ? (
                  <div key={s.label} style={{ padding: "6px 10px", borderLeft: "3px solid " + s.c, background: "#F7F7F5", borderRadius: 6 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: s.c, textTransform: "uppercase", marginBottom: 2 }}>{s.label}</div>
                    <div style={{ fontSize: 12, color: "#3A3A3A" }}>{s.val}</div>
                  </div>
                ) : null)}
              </div>
            )}
            {showReview && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div>
                  <label style={{ fontSize: 10, fontWeight: 700, color: "#005A2B", textTransform: "uppercase", letterSpacing: "0.05em" }}>What went well?</label>
                  <textarea value={went} onChange={e => setWent(e.target.value)} placeholder="Wins, progress, breakthroughs..." rows={2} style={{ width: "100%", background: "#FAFAF8", border: "1.5px solid #C8C8C0", borderRadius: 6, padding: "8px 10px", fontSize: 13, fontFamily: "inherit", outline: "none", color: "#1A1A1A", resize: "vertical", boxSizing: "border-box" }} />
                </div>
                <div>
                  <label style={{ fontSize: 10, fontWeight: 700, color: "#A85B36", textTransform: "uppercase", letterSpacing: "0.05em" }}>What didn't work?</label>
                  <textarea value={didnt} onChange={e => setDidnt(e.target.value)} placeholder="Blockers, dropped balls, lessons..." rows={2} style={{ width: "100%", background: "#FAFAF8", border: "1.5px solid #C8C8C0", borderRadius: 6, padding: "8px 10px", fontSize: 13, fontFamily: "inherit", outline: "none", color: "#1A1A1A", resize: "vertical", boxSizing: "border-box" }} />
                </div>
                <div>
                  <label style={{ fontSize: 10, fontWeight: 700, color: "#4A6B8A", textTransform: "uppercase", letterSpacing: "0.05em" }}>Focus for next week</label>
                  <textarea value={focus} onChange={e => setFocus(e.target.value)} placeholder="Top priorities, commitments..." rows={2} style={{ width: "100%", background: "#FAFAF8", border: "1.5px solid #C8C8C0", borderRadius: 6, padding: "8px 10px", fontSize: 13, fontFamily: "inherit", outline: "none", color: "#1A1A1A", resize: "vertical", boxSizing: "border-box" }} />
                </div>
                <Btn onClick={saveReview} primary>Save Review</Btn>
              </div>
            )}
          </Card>
        );
      })()}

      {/* Shopping Lists */}
      <Card>
        <SH title="Shopping Lists" icon="🛒" />
        <div style={{ display: "flex", gap: 4 }}>
          {[{ key: "grocery", label: "Grocery", icon: "🥬" }, { key: "amazon", label: "Amazon", icon: "📦" }].map(t => {
            const items = ((data.shoppingLists || {})[t.key] || []);
            const remaining = items.filter(i => !i.done).length;
            return (
              <button key={t.key} onClick={() => setShopTab(t.key)} style={{ flex: 1, background: shopTab === t.key ? (t.key === "grocery" ? "#005A2B" : "#4A6B8A") : "transparent", color: shopTab === t.key ? "#fff" : "#6E6E68", border: shopTab === t.key ? "none" : "1px solid #D6D6D0", borderRadius: 20, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                {t.icon} {t.label}{remaining > 0 ? " (" + remaining + ")" : ""}
              </button>
            );
          })}
        </div>
        {(() => {
          const lists = data.shoppingLists || { grocery: [], amazon: [] };
          const items = lists[shopTab] || [];
          const unchecked = items.filter(i => !i.done);
          const checked = items.filter(i => i.done);
          const tabColor = shopTab === "grocery" ? "#005A2B" : "#4A6B8A";
          const addItem = () => {
            if (!shopText.trim()) return;
            save({ ...data, shoppingLists: { ...lists, [shopTab]: [...items, { id: Date.now(), text: shopText.trim(), done: false }] } });
            setShopText("");
          };
          const toggleItem = (id) => save({ ...data, shoppingLists: { ...lists, [shopTab]: items.map(i => i.id === id ? { ...i, done: !i.done } : i) } });
          const removeItem = (id) => save({ ...data, shoppingLists: { ...lists, [shopTab]: items.filter(i => i.id !== id) } });
          const clearDone = () => save({ ...data, shoppingLists: { ...lists, [shopTab]: items.filter(i => !i.done) } });
          return (
            <>
              <div style={{ display: "flex", gap: 8 }}>
                <div style={{ flex: 1 }}><Inp value={shopText} onChange={e => setShopText(e.target.value)} placeholder={"Add " + shopTab + " item..."} onKeyDown={e => e.key === "Enter" && addItem()} /></div>
                <Btn onClick={addItem} primary>+</Btn>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {unchecked.map(item => (
                  <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", background: "#F7F7F5", borderRadius: 8, border: "1px solid #D6D6D0" }}>
                    <Check checked={false} onClick={() => toggleItem(item.id)} color={tabColor} size={20} />
                    <span style={{ fontSize: 13, color: "#2A2A2A", flex: 1 }}>{item.text}</span>
                    <button onClick={() => removeItem(item.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 14 }}>×</button>
                  </div>
                ))}
                {checked.length > 0 && (
                  <>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 6 }}>
                      <span style={{ fontSize: 10, fontWeight: 700, color: "#9C9C94", textTransform: "uppercase", letterSpacing: "0.06em" }}>Done ({checked.length})</span>
                      <button onClick={clearDone} style={{ background: "none", border: "none", color: "#9C9C94", cursor: "pointer", fontSize: 10, fontWeight: 700, fontFamily: "inherit", textTransform: "uppercase" }}>Clear</button>
                    </div>
                    {checked.map(item => (
                      <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 12px", background: "#EFEFEC", borderRadius: 8, border: "1px solid #D6D6D0", opacity: 0.6 }}>
                        <Check checked={true} onClick={() => toggleItem(item.id)} color={tabColor} size={20} />
                        <span style={{ fontSize: 13, color: "#6E6E68", flex: 1, textDecoration: "line-through" }}>{item.text}</span>
                        <button onClick={() => removeItem(item.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 14 }}>×</button>
                      </div>
                    ))}
                  </>
                )}
                {items.length === 0 && <div style={{ fontSize: 12, color: "#9C9C94", fontStyle: "italic", textAlign: "center", padding: "8px 0" }}>{shopTab === "grocery" ? "Your grocery list is empty" : "Nothing to order"}</div>}
              </div>
            </>
          );
        })()}
      </Card>

      {/* Days Sober */}
      <Card>
        <SH title="Days Sober" icon="🛡️" />
        {data.soberDate ? (() => {
          const start = new Date(data.soberDate + "T00:00:00");
          const now = new Date(getToday() + "T00:00:00");
          const days = Math.floor((now - start) / 86400000);
          const weeks = Math.floor(days / 7);
          const months = Math.floor(days / 30.44);
          const milestones = [7, 14, 30, 60, 90, 100, 180, 365, 500, 730, 1000, 1095, 1460, 1825];
          const nextMilestone = milestones.find(m => m > days);
          const daysToNext = nextMilestone ? nextMilestone - days : null;
          const pctToNext = nextMilestone ? Math.round((days / nextMilestone) * 100) : 100;
          const milestoneLabel = (d) => d >= 365 ? Math.floor(d / 365) + (d % 365 === 0 ? " year" + (d / 365 > 1 ? "s" : "") : "y " + (d % 365) + "d") : d + " days";
          return (
            <>
              <div style={{ textAlign: "center", padding: "8px 0" }}>
                <div style={{ fontSize: 48, fontWeight: 900, color: "#005A2B", lineHeight: 1, letterSpacing: "-0.02em" }}>{days}</div>
                <div style={{ fontSize: 11, fontWeight: 800, color: "#6E6E68", textTransform: "uppercase", letterSpacing: "0.1em", marginTop: 4 }}>Days Strong</div>
              </div>
              <div style={{ display: "flex", justifyContent: "center", gap: 24 }}>
                <div style={{ textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 800, color: "#3A3A3A" }}>{weeks}</div><div style={{ fontSize: 10, color: "#6E6E68", fontWeight: 700 }}>WEEKS</div></div>
                <div style={{ width: 1, background: "#D6D6D0" }} />
                <div style={{ textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 800, color: "#3A3A3A" }}>{months}</div><div style={{ fontSize: 10, color: "#6E6E68", fontWeight: 700 }}>MONTHS</div></div>
              </div>
              {nextMilestone && (
                <div style={{ padding: "10px 0 0" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: "#6E6E68" }}>Next: {milestoneLabel(nextMilestone)}</span>
                    <span style={{ fontSize: 11, fontWeight: 700, color: "#005A2B" }}>{daysToNext}d to go</span>
                  </div>
                  <ProgBar pct={pctToNext} color="#005A2B" />
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 11, color: "#9C9C94" }}>Since {new Date(data.soberDate + "T00:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}</span>
                <button onClick={() => save({ ...data, soberDate: null })} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 10, fontFamily: "inherit", fontWeight: 700, textTransform: "uppercase" }}>Reset</button>
              </div>
            </>
          );
        })() : (
          <div style={{ textAlign: "center", padding: "8px 0" }}>
            <div style={{ fontSize: 13, color: "#9C9C94", marginBottom: 12 }}>Set your start date to begin tracking.</div>
            <div style={{ display: "flex", justifyContent: "center", gap: 8, alignItems: "center" }}>
              <input type="date" id="soberDateInput" style={{ background: "#FAFAF8", border: "1.5px solid #C8C8C0", borderRadius: 6, padding: "8px 12px", fontSize: 13, fontFamily: "inherit", color: "#1A1A1A", outline: "none" }} />
              <Btn onClick={() => { const v = document.getElementById("soberDateInput").value; if (v) save({ ...data, soberDate: v }); }} primary>Start</Btn>
            </div>
          </div>
        )}
      </Card>

    </div>
  );
}

/* ══ WORK ══ */
function BizPanel({ data, save, prefix, color, label }) {
  const [sub, setSub] = useState("projects");
  const tabs = ["projects", "backlog", "metrics", "swot", "photos"];
  const k = (field) => prefix + field.charAt(0).toUpperCase() + field.slice(1);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16, paddingBottom: 20 }}>
      <div style={{ display: "flex", gap: 4, overflowX: "auto", paddingBottom: 4 }}>
        {tabs.map(s => <button key={s} onClick={() => setSub(s)} style={{ background: sub === s ? color : "transparent", color: sub === s ? "#fff" : "#6E6E68", border: sub === s ? "none" : "1px solid #D6D6D0", borderRadius: 20, padding: "5px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap", textTransform: "capitalize" }}>{s}</button>)}
      </div>
      {sub === "projects" && <BizProjects data={data} save={save} dk={k("Projects")} color={color} label={label} />}
      {sub === "backlog" && <BizBacklog data={data} save={save} dkB={k("Backlog")} dkP={k("Projects")} color={color} />}
      {sub === "metrics" && <BizMetrics data={data} save={save} dk={k("Metrics")} color={color} />}
      {sub === "swot" && <BizSwot data={data} save={save} dk={k("Swot")} />}
      {sub === "photos" && <BizPhotos data={data} save={save} dk={k("Photos")} />}
    </div>
  );
}

function BizProjects({ data, save, dk, color, label }) {
  const [adding, setAdding] = useState(false);
  const [name, setName] = useState("");
  const [ms, setMs] = useState("");
  const [milestones, setMilestones] = useState([]);
  const projects = data[dk] || [];

  const add = () => { if (!name.trim()) return; save({ ...data, [dk]: [...projects, { id: Date.now(), name: name.trim(), milestones: milestones.map((m, i) => ({ id: i, text: m, done: false })), createdAt: getToday() }] }); setName(""); setMilestones([]); setAdding(false); };
  const toggleMs = (pid, mid) => save({ ...data, [dk]: projects.map(p => p.id !== pid ? p : { ...p, milestones: p.milestones.map(m => m.id === mid ? { ...m, done: !m.done } : m) }) });
  const del = (pid) => save({ ...data, [dk]: projects.filter(p => p.id !== pid) });

  return (
    <>
      <Card>
        <SH title="Active Projects" icon="📋" action={!adding && <Btn onClick={() => setAdding(true)}>+ New</Btn>} />
        {adding && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8, background: "#EFEFEC", borderRadius: 12, padding: 14 }}>
            <Inp value={name} onChange={e => setName(e.target.value)} placeholder="Project name..." onKeyDown={e => e.key === "Enter" && add()} />
            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ flex: 1 }}><Inp value={ms} onChange={e => setMs(e.target.value)} placeholder="Add milestone..." style={{ fontSize: 13 }} onKeyDown={e => { if (e.key === "Enter" && ms.trim()) { setMilestones([...milestones, ms.trim()]); setMs(""); } }} /></div>
              <Btn onClick={() => { if (ms.trim()) { setMilestones([...milestones, ms.trim()]); setMs(""); } }}>+</Btn>
            </div>
            {milestones.map((m, i) => <div key={i} style={{ fontSize: 12, color: "#505050", display: "flex", gap: 6, alignItems: "center" }}><span style={{ width: 5, height: 5, borderRadius: 3, background: "#A8A8A0" }} />{m}<button onClick={() => setMilestones(milestones.filter((_, j) => j !== i))} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", marginLeft: "auto", fontSize: 11 }}>×</button></div>)}
            <div style={{ display: "flex", gap: 8 }}><Btn onClick={add} primary>Save</Btn><Btn onClick={() => { setAdding(false); setName(""); setMilestones([]); }}>Cancel</Btn></div>
          </div>
        )}
        {projects.length === 0 && !adding && <Empty text={`Add your first ${label} project.`} />}
      </Card>
      {projects.map(p => {
        const done = p.milestones.filter(m => m.done).length;
        const total = p.milestones.length;
        const pct = total ? Math.round(done / total * 100) : 0;
        return (
          <Card key={p.id}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {total > 0 && <div style={{ position: "relative", flexShrink: 0 }}><Ring pct={pct} size={48} color={color} /><div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: color }}>{pct}%</div></div>}
              <div style={{ flex: 1 }}><div style={{ fontSize: 16, fontWeight: 700 }}>{p.name}</div><div style={{ fontSize: 12, color: "#6E6E68", marginTop: 2 }}>{total ? done + "/" + total + " milestones" : "No milestones"}</div></div>
              <button onClick={() => del(p.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 16 }}>×</button>
            </div>
            {total > 0 && <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>{p.milestones.map(m => (
              <div key={m.id} onClick={() => toggleMs(p.id, m.id)} style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", padding: "8px 12px", borderRadius: 10, background: m.done ? color + "10" : "#F7F7F5", border: "1px solid " + (m.done ? color + "25" : "#D6D6D0") }}>
                <Check checked={m.done} size={18} color={color} /><span style={{ fontSize: 13, color: m.done ? "#6E6E68" : "#444", textDecoration: m.done ? "line-through" : "none" }}>{m.text}</span>
              </div>
            ))}</div>}
          </Card>
        );
      })}
    </>
  );
}

function BizBacklog({ data, save, dkB, dkP, color }) {
  const [text, setText] = useState("");
  const items = data[dkB] || [];
