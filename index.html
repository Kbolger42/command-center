/* ══ STOCK HOLDINGS ══ */
const stockPriceCache = {};

function StockHoldings({ data, save }) {
  const [ticker, setTicker] = useState("");
  const [shares, setShares] = useState("");
  const [costBasis, setCostBasis] = useState("");
  const [prices, setPrices] = useState(stockPriceCache);
  const [loadingPrices, setLoadingPrices] = useState(false);
  const [lastFetched, setLastFetched] = useState(null);
  const holdings = data.stockHoldings || [];

  const addHolding = () => {
    if (!ticker.trim() || !shares) return;
    const t = ticker.trim().toUpperCase();
    save({ ...data, stockHoldings: [...holdings, { id: Date.now(), ticker: t, shares: parseFloat(shares) || 0, costBasis: parseFloat(costBasis) || 0, addedDate: getToday() }] });
    setTicker(""); setShares(""); setCostBasis("");
  };

  const removeHolding = (id) => save({ ...data, stockHoldings: holdings.filter(h => h.id !== id) });

  const fetchPrices = async () => {
    if (holdings.length === 0) return;
    setLoadingPrices(true);
    try {
      const tickers = [...new Set(holdings.map(h => h.ticker))];
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: "Get the current stock price for each of these tickers: " + tickers.join(", ") + ". Return ONLY a JSON object mapping ticker to price as a number. Example: {\"AAPL\": 185.50, \"TSLA\": 242.10}. No other text, no markdown." }],
          tools: [{ type: "web_search_20250305", name: "web_search" }]
        })
      });
      const result = await response.json();
      const textBlocks = (result.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
      try {
        const clean = textBlocks.replace(/```json|```/g, "").trim();
        const match = clean.match(/\{[\s\S]*\}/);
        if (match) {
          const parsed = JSON.parse(match[0]);
          Object.assign(stockPriceCache, parsed);
          setPrices({ ...stockPriceCache });
          setLastFetched(new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" }));
        }
      } catch (e) { /* parse failed */ }
    } catch (err) { /* fetch failed */ }
    setLoadingPrices(false);
  };

  useEffect(() => {
    if (holdings.length > 0 && Object.keys(stockPriceCache).length === 0) fetchPrices();
  }, []);

  const totalValue = holdings.reduce((s, h) => s + (prices[h.ticker] || 0) * h.shares, 0);
  const totalCost = holdings.reduce((s, h) => s + (h.costBasis || 0) * h.shares, 0);
  const totalGain = totalValue - totalCost;
  const totalGainPct = totalCost > 0 ? ((totalGain / totalCost) * 100).toFixed(1) : 0;

  return (
    <Card>
      <SH title="Stock Holdings" icon="📊" action={
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          {lastFetched && <span style={{ fontSize: 10, color: "#6E6E68" }}>{lastFetched}</span>}
          {!loadingPrices && holdings.length > 0 && <button onClick={fetchPrices} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: "#6E6E68", padding: 0 }} title="Refresh prices">↻</button>}
        </div>
      } />
      {/* Add holding form */}
      <div style={{ display: "flex", flexDirection: "column", gap: 8, background: "#EFEFEC", borderRadius: 12, padding: 14 }}>
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}><Inp value={ticker} onChange={e => setTicker(e.target.value.toUpperCase())} placeholder="Ticker (AAPL)" style={{ fontSize: 13, textTransform: "uppercase" }} /></div>
          <div style={{ flex: 1 }}><Inp value={shares} onChange={e => setShares(e.target.value)} placeholder="Shares" type="number" style={{ fontSize: 13 }} /></div>
          <div style={{ flex: 1 }}><Inp value={costBasis} onChange={e => setCostBasis(e.target.value)} placeholder="Avg Cost $" type="number" style={{ fontSize: 13 }} /></div>
        </div>
        <Btn onClick={addHolding} primary>Add Holding</Btn>
      </div>

      {loadingPrices && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "12px 0", gap: 8 }}>
          <div style={{ width: 14, height: 14, border: "2px solid #D6D6D0", borderTopColor: "#005A2B", borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          <span style={{ fontSize: 12, color: "#6E6E68" }}>Fetching live prices...</span>
        </div>
      )}

      {/* Portfolio summary */}
      {holdings.length > 0 && Object.keys(prices).length > 0 && (
        <div style={{ display: "flex", justifyContent: "space-around", padding: "12px 0", borderBottom: "1px solid #D6D6D0" }}>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: "#1A1A1A" }}>{fmtMoney(totalValue)}</div>
            <div style={{ fontSize: 10, color: "#6E6E68", fontWeight: 600 }}>MARKET VALUE</div>
          </div>
          <div style={{ width: 1, background: "#D6D6D0" }} />
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: totalGain >= 0 ? "#005A2B" : "#A85B36" }}>
              {totalGain >= 0 ? "+" : ""}{fmtMoney(totalGain)}
            </div>
            <div style={{ fontSize: 10, color: "#6E6E68", fontWeight: 600 }}>{totalGain >= 0 ? "↑" : "↓"} {totalGainPct}% ALL TIME</div>
          </div>
        </div>
      )}

      {/* Holdings list */}
      {holdings.length === 0 && <Empty text="Add stock tickers to track your portfolio." />}
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {[...holdings].sort((a, b) => ((prices[b.ticker] || 0) * b.shares) - ((prices[a.ticker] || 0) * a.shares)).map(h => {
          const price = prices[h.ticker];
          const mktVal = price ? price * h.shares : null;
          const gain = price && h.costBasis ? (price - h.costBasis) * h.shares : null;
          const gainPct = h.costBasis > 0 && price ? (((price - h.costBasis) / h.costBasis) * 100).toFixed(1) : null;
          return (
            <div key={h.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: "#F7F7F5", borderRadius: 10, border: "1px solid #D6D6D0" }}>
              <div style={{ width: 40, height: 40, borderRadius: 10, background: gain !== null ? (gain >= 0 ? "#005A2B15" : "#A85B3615") : "#D6D6D0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: gain !== null ? (gain >= 0 ? "#005A2B" : "#A85B36") : "#6E6E68", flexShrink: 0 }}>
                {h.ticker.slice(0, 4)}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 14, fontWeight: 700 }}>{h.ticker}</span>
                  <span style={{ fontSize: 11, color: "#6E6E68" }}>{h.shares} shares</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2 }}>
                  {price ? (
                    <>
                      <span style={{ fontSize: 12, color: "#6E6E68" }}>${price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}/share</span>
                      {gainPct !== null && <span style={{ fontSize: 10, fontWeight: 700, color: gain >= 0 ? "#005A2B" : "#A85B36", background: gain >= 0 ? "#005A2B15" : "#A85B3615", padding: "1px 6px", borderRadius: 4 }}>{gain >= 0 ? "+" : ""}{gainPct}%</span>}
                    </>
                  ) : (
                    <span style={{ fontSize: 11, color: "#9C9C94" }}>Cost: ${h.costBasis.toFixed(2)}</span>
                  )}
                </div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                {mktVal !== null ? (
                  <>
                    <div style={{ fontSize: 16, fontWeight: 800, color: "#005A2B" }}>{fmtMoney(mktVal)}</div>
                    {gain !== null && <div style={{ fontSize: 11, fontWeight: 700, color: gain >= 0 ? "#005A2B" : "#A85B36" }}>{gain >= 0 ? "+" : ""}{fmtMoney(gain)}</div>}
                  </>
                ) : (
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#A8A8A0" }}>—</div>
                )}
              </div>
              <button onClick={() => removeHolding(h.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 14, flexShrink: 0 }}>×</button>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

/* ══ FINANCE ══ */
function FinancePanel({ data, save }) {
  const [adding, setAdding] = useState(null);
  const [name, setName] = useState(""); const [balance, setBalance] = useState(""); const [target, setTarget] = useState(""); const [targetLabel, setTargetLabel] = useState("");
  const [editing, setEditing] = useState(null); const [editBal, setEditBal] = useState("");
  const accounts = data.finAccounts || [];

  const addAcc = (cat) => { if (!name.trim() || !balance) return; save({ ...data, finAccounts: [...accounts, { id: Date.now(), name: name.trim(), category: cat, balance: parseFloat(balance) || 0, target: target ? parseFloat(target) : null, targetLabel: targetLabel.trim() || null, history: [{ date: getToday(), amount: parseFloat(balance) || 0 }] }] }); setName(""); setBalance(""); setTarget(""); setTargetLabel(""); setAdding(null); };
  const updateBal = (id) => { const v = parseFloat(editBal); if (isNaN(v)) return; save({ ...data, finAccounts: accounts.map(a => { if (a.id !== id) return a; const h = [...(a.history || [])]; const ti = h.findIndex(x => x.date === getToday()); if (ti >= 0) h[ti].amount = v; else h.push({ date: getToday(), amount: v }); return { ...a, balance: v, history: h }; }) }); setEditing(null); };
  const del = (id) => save({ ...data, finAccounts: accounts.filter(a => a.id !== id) });

  const totalAssets = accounts.filter(a => FIN_CATS.find(c => c.key === a.category && c.isAsset && !c.excludeFromNW)).reduce((s, a) => s + (a.balance || 0), 0);
  const totalDebt = accounts.filter(a => FIN_CATS.find(c => c.key === a.category && !c.isAsset && !c.excludeFromNW)).reduce((s, a) => s + (a.balance || 0), 0);
  const netWorth = totalAssets - totalDebt;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16, paddingBottom: 20 }}>
      <Card style={{ alignItems: "center", padding: "24px 20px", background: "linear-gradient(135deg, #F7F7F5 0%, #EFEFEC 100%)" }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#6E6E68", textTransform: "uppercase", letterSpacing: "0.1em" }}>Net Worth</div>
        <div style={{ fontSize: 36, fontWeight: 800, color: netWorth >= 0 ? "#1a1a1a" : "#A85B36" }}>{fmtMoney(netWorth)}</div>
        <div style={{ display: "flex", gap: 24, marginTop: 8 }}>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 700, color: "#005A2B" }}>{fmtMoney(totalAssets)}</div><div style={{ fontSize: 10, color: "#6E6E68", fontWeight: 600 }}>ASSETS</div></div>
          <div style={{ width: 1, background: "#D6D6D0" }} />
          <div style={{ textAlign: "center" }}><div style={{ fontSize: 18, fontWeight: 700, color: "#A85B36" }}>{fmtMoney(totalDebt)}</div><div style={{ fontSize: 10, color: "#6E6E68", fontWeight: 600 }}>DEBT</div></div>
        </div>
      </Card>
      {FIN_CATS.filter(c => c.key !== "business").map(cat => {
        const ca = accounts.filter(a => a.category === cat.key);
        const catTotal = ca.reduce((s, a) => s + (a.balance || 0), 0);
        return (
          <React.Fragment key={cat.key}>
          <Card>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}><span style={{ fontSize: 18 }}>{cat.icon}</span><div><div style={{ fontSize: 14, fontWeight: 700 }}>{cat.label}</div>{ca.length > 0 && <div style={{ fontSize: 12, color: cat.color, fontWeight: 600 }}>{fmtMoney(catTotal)}</div>}</div></div>
              {adding !== cat.key && <Btn onClick={() => setAdding(cat.key)}>+ Add</Btn>}
            </div>
            {adding === cat.key && (
              <div style={{ display: "flex", flexDirection: "column", gap: 8, background: "#EFEFEC", borderRadius: 12, padding: 14 }}>
                <Inp value={name} onChange={e => setName(e.target.value)} placeholder={"Account name..."} />
                <div style={{ display: "flex", gap: 8 }}><div style={{ flex: 1 }}><Inp value={balance} onChange={e => setBalance(e.target.value)} placeholder={cat.isAsset ? "Value ($)" : "Owed ($)"} type="number" style={{ fontSize: 13 }} /></div><div style={{ flex: 1 }}><Inp value={target} onChange={e => setTarget(e.target.value)} placeholder="Target ($)" type="number" style={{ fontSize: 13 }} /></div></div>
                <Inp value={targetLabel} onChange={e => setTargetLabel(e.target.value)} placeholder="Target label (e.g. By Dec 2026)" style={{ fontSize: 12 }} />
                <div style={{ display: "flex", gap: 8 }}><Btn onClick={() => addAcc(cat.key)} primary>Save</Btn><Btn onClick={() => { setAdding(null); setName(""); setBalance(""); setTarget(""); setTargetLabel(""); }}>Cancel</Btn></div>
              </div>
            )}
            {ca.length === 0 && adding !== cat.key && <div style={{ fontSize: 13, color: "#9C9C94", fontStyle: "italic" }}>No accounts yet.</div>}
            {ca.map(acc => {
              const hasT = acc.target != null;
              let pct = 0;
              if (hasT) {
                if (cat.isAsset) { pct = acc.target > 0 ? Math.round(acc.balance / acc.target * 100) : 0; }
                else { const sv = (acc.history && acc.history[0]) ? acc.history[0].amount : acc.balance; if (sv > acc.target) pct = Math.round((sv - acc.balance) / (sv - acc.target) * 100); }
              }
              pct = Math.max(0, Math.min(pct, 100));
              const first = (acc.history && acc.history.length > 1) ? acc.history[0].amount : null;
              const change = first !== null ? acc.balance - first : null;
              return (
                <div key={acc.id} style={{ padding: "10px 12px", background: "#F7F7F5", borderRadius: 12, border: "1px solid #D6D6D0" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    {hasT && <div style={{ position: "relative", flexShrink: 0 }}><Ring pct={pct} size={40} stroke={3.5} color={cat.color} /><div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: cat.color }}>{pct}%</div></div>}
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{acc.name}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 3 }}>
                        {editing === acc.id
                          ? <div style={{ display: "flex", gap: 4 }}><input value={editBal} onChange={e => setEditBal(e.target.value)} type="number" autoFocus onKeyDown={e => { if (e.key === "Enter") updateBal(acc.id); if (e.key === "Escape") setEditing(null); }} style={{ width: 100, background: "#FAFAF8", border: "1.5px solid " + cat.color, borderRadius: 6, padding: "2px 8px", fontSize: 14, fontWeight: 700, fontFamily: "inherit", outline: "none" }} /><Btn onClick={() => updateBal(acc.id)} primary small>✓</Btn></div>
                          : <span onClick={() => { setEditing(acc.id); setEditBal(String(acc.balance)); }} style={{ fontSize: 16, fontWeight: 700, color: cat.color, cursor: "pointer", borderBottom: "1px dashed " + cat.color + "40" }}>{fmtMoney(acc.balance)}</span>
                        }
                        {change !== null && editing !== acc.id && <span style={{ fontSize: 11, fontWeight: 600, color: cat.isAsset ? (change >= 0 ? "#005A2B" : "#A85B36") : (change <= 0 ? "#005A2B" : "#A85B36") }}>{cat.isAsset ? (change >= 0 ? "↑" : "↓") : (change <= 0 ? "↓" : "↑")} {fmtShort(Math.abs(change))}</span>}
                      </div>
                      {hasT && <div style={{ fontSize: 11, color: "#6E6E68", marginTop: 3 }}>Target: {fmtMoney(acc.target)}{acc.targetLabel ? " · " + acc.targetLabel : ""}</div>}
                    </div>
                    <button onClick={() => del(acc.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 14 }}>×</button>
                  </div>
                  {hasT && <div style={{ marginTop: 10 }}><ProgBar pct={pct} color={cat.color} /></div>}
                </div>
              );
            })}
          </Card>
          {cat.key === "investments" && <StockHoldings data={data} save={save} />}
          </React.Fragment>
        );
      })}
      <BusinessRevenue data={data} save={save} />
      <NetWorthProjection data={data} />
    </div>
  );
}

/* ══ BUSINESS REVENUE ══ */
function BusinessRevenue({ data, save }) {
  const C = "#005A2B";
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const rev = data.businessRevenue || [];
  const [selYear, setSelYear] = useState(new Date().getFullYear());
  const [editMonth, setEditMonth] = useState(null);
  const [editVal, setEditVal] = useState("");

  const getEntry = (year, month) => rev.find(r => r.year === year && r.month === month);
  const yearData = months.map((m, i) => ({ label: m, month: i, entry: getEntry(selYear, i) }));
  const yearTotal = yearData.reduce((s, d) => s + (d.entry ? d.entry.amount : 0), 0);
  const filledMonths = yearData.filter(d => d.entry);
  const prevYearTotal = months.reduce((s, _, i) => { const e = getEntry(selYear - 1, i); return s + (e ? e.amount : 0); }, 0);
  const yoyChange = prevYearTotal > 0 ? (((yearTotal - prevYearTotal) / prevYearTotal) * 100).toFixed(1) : null;

  const saveMonth = (month) => {
    const v = parseFloat(editVal);
    if (isNaN(v)) return;
    const existing = rev.findIndex(r => r.year === selYear && r.month === month);
    let updated;
    if (existing >= 0) { updated = [...rev]; updated[existing] = { ...updated[existing], amount: v }; }
    else { updated = [...rev, { year: selYear, month, amount: v }]; }
    save({ ...data, businessRevenue: updated });
    setEditMonth(null);
  };

  const maxMonth = Math.max(...yearData.map(d => d.entry ? d.entry.amount : 0), 1);
  const years = [...new Set(rev.map(r => r.year).concat(new Date().getFullYear()))].sort();

  return (
    <Card>
      <SH title="Business Revenue" icon="💼" />
      {/* Year selector */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 16 }}>
        <button onClick={() => setSelYear(y => y - 1)} style={{ background: "none", border: "none", fontSize: 18, color: "#6E6E68", cursor: "pointer", padding: "4px 8px" }}>‹</button>
        <span style={{ fontSize: 18, fontWeight: 800, color: "#1A1A1A" }}>{selYear}</span>
        <button onClick={() => setSelYear(y => y + 1)} style={{ background: "none", border: "none", fontSize: 18, color: "#6E6E68", cursor: "pointer", padding: "4px 8px" }}>›</button>
      </div>
      {/* Year total */}
      <div style={{ textAlign: "center", padding: "8px 0" }}>
        <div style={{ fontSize: 28, fontWeight: 800, color: C }}>{fmtMoney(yearTotal)}</div>
        <div style={{ fontSize: 11, color: "#6E6E68", fontWeight: 600 }}>TOTAL REVENUE · {selYear}</div>
        {yoyChange !== null && <div style={{ fontSize: 12, fontWeight: 700, color: parseFloat(yoyChange) >= 0 ? "#005A2B" : "#A85B36", marginTop: 4 }}>{parseFloat(yoyChange) >= 0 ? "↑" : "↓"} {Math.abs(yoyChange)}% vs {selYear - 1}</div>}
      </div>
      {/* Monthly bars */}
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        {yearData.map(d => {
          const amt = d.entry ? d.entry.amount : 0;
          const pct = maxMonth > 0 ? (amt / maxMonth) * 100 : 0;
          const isEditing = editMonth === d.month;
          return (
            <div key={d.month} style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ width: 30, fontSize: 11, fontWeight: 600, color: "#6E6E68", textAlign: "right", flexShrink: 0 }}>{d.label}</span>
              <div style={{ flex: 1, height: 28, background: "#EFEFEC", borderRadius: 6, position: "relative", overflow: "hidden", cursor: "pointer" }} onClick={() => { if (!isEditing) { setEditMonth(d.month); setEditVal(amt > 0 ? String(amt) : ""); } }}>
                <div style={{ height: "100%", width: pct + "%", background: `linear-gradient(90deg, ${C}30, ${C}80)`, borderRadius: 6, transition: "width 0.3s" }} />
                {!isEditing && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "flex-end", paddingRight: 8, fontSize: 11, fontWeight: 600, color: amt > 0 ? "#555" : "#9C9C94" }}>{amt > 0 ? fmtMoney(amt) : "Tap to add"}</div>}
              </div>
              {isEditing && (
                <div style={{ display: "flex", gap: 4 }}>
                  <input value={editVal} onChange={e => setEditVal(e.target.value)} type="number" autoFocus placeholder="$" onKeyDown={e => { if (e.key === "Enter") saveMonth(d.month); if (e.key === "Escape") setEditMonth(null); }} style={{ width: 80, background: "#FAFAF8", border: "1.5px solid " + C, borderRadius: 6, padding: "4px 8px", fontSize: 13, fontWeight: 600, fontFamily: "inherit", outline: "none" }} />
                  <Btn onClick={() => saveMonth(d.month)} primary small>✓</Btn>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {/* Monthly avg */}
      {filledMonths.length > 0 && (
        <div style={{ display: "flex", justifyContent: "center", gap: 24, paddingTop: 8, borderTop: "1px solid #D6D6D0" }}>
          <div style={{ textAlign: "center" }}><div style={{ fontSize: 16, fontWeight: 700, color: C }}>{fmtMoney(Math.round(yearTotal / filledMonths.length))}</div><div style={{ fontSize: 10, color: "#6E6E68", fontWeight: 600 }}>AVG / MONTH</div></div>
          <div style={{ width: 1, background: "#D6D6D0" }} />
          <div style={{ textAlign: "center" }}><div style={{ fontSize: 16, fontWeight: 700, color: "#3A3A3A" }}>{filledMonths.length}</div><div style={{ fontSize: 10, color: "#6E6E68", fontWeight: 600 }}>MONTHS LOGGED</div></div>
        </div>
      )}
    </Card>
  );
}

/* ══ NET WORTH PROJECTION ══ */
function NetWorthProjection({ data }) {
  const accounts = data.finAccounts || [];
  const totalAssets = accounts.filter(a => FIN_CATS.find(c => c.key === a.category && c.isAsset && !c.excludeFromNW)).reduce((s, a) => s + (a.balance || 0), 0);
  const totalDebt = accounts.filter(a => FIN_CATS.find(c => c.key === a.category && !c.isAsset && !c.excludeFromNW)).reduce((s, a) => s + (a.balance || 0), 0);
  const currentNW = totalAssets - totalDebt;

  const investBal = accounts.filter(a => a.category === "investments").reduce((s, a) => s + (a.balance || 0), 0);
  const propBal = accounts.filter(a => a.category === "property").reduce((s, a) => s + (a.balance || 0), 0);
  const cashBal = accounts.filter(a => a.category === "cash").reduce((s, a) => s + (a.balance || 0), 0);
  const debtBal = accounts.filter(a => a.category === "debt").reduce((s, a) => s + (a.balance || 0), 0);

  const [investRate, setInvestRate] = useState(7);
  const [propRate, setPropRate] = useState(3);
  const [cashRate, setCashRate] = useState(1);
  const [debtRate, setDebtRate] = useState(0);
  const [annualSavings, setAnnualSavings] = useState(0);
  const [savingsGrowth, setSavingsGrowth] = useState(3);
  const [events, setEvents] = useState(data.nwEvents || []);
  const [addingEvent, setAddingEvent] = useState(false);
  const [evName, setEvName] = useState("");
  const [evYear, setEvYear] = useState("");
  const [evAmount, setEvAmount] = useState("");
  const [scenario, setScenario] = useState("base");

  const thisYear = new Date().getFullYear();

  const addEvent = () => {
    if (!evName.trim() || !evYear || !evAmount) return;
    const ne = [...events, { id: Date.now(), name: evName.trim(), year: parseInt(evYear), amount: parseFloat(evAmount) }];
    setEvents(ne);
    setEvName(""); setEvYear(""); setEvAmount("");
    setAddingEvent(false);
  };
  const removeEvent = (id) => setEvents(events.filter(e => e.id !== id));

  const buildProjection = (mult) => {
    const points = [];
    let inv = investBal, prop = propBal, cash = cashBal, debt = debtBal;
    let sav = annualSavings;
    for (let i = 0; i <= 30; i++) {
      const year = thisYear + i;
      const ev = events.filter(e => e.year === year);
      const evImpact = ev.reduce((s, e) => s + e.amount, 0);
      if (i > 0) {
        inv = inv * (1 + (investRate * mult) / 100) + sav;
        prop = prop * (1 + (propRate * mult) / 100);
        cash = cash * (1 + (cashRate * mult) / 100);
        debt = Math.max(0, debt - (debt * (debtRate / 100 || 0.05)));
        sav = sav * (1 + savingsGrowth / 100);
        inv += evImpact;
      }
      const nw = inv + prop + cash - debt;
      points.push({ year, nw: Math.round(nw), label: year.toString(), events: ev.map(e => e.name).join(", ") });
    }
    return points;
  };

  const baseData = buildProjection(1);
  const consData = buildProjection(0.5);
  const optData = buildProjection(1.5);

  const chartData = baseData.map((d, i) => ({
    year: d.label,
    base: d.nw,
    conservative: consData[i].nw,
    optimistic: optData[i].nw,
    events: d.events,
  }));

  const finalNW = baseData[30].nw;
  const milestones = [100000, 250000, 500000, 1000000, 2500000, 5000000, 10000000, 25000000, 50000000, 100000000];
  const nextMilestone = milestones.find(m => m > currentNW);
  const yearsToMilestone = nextMilestone ? baseData.findIndex(d => d.nw >= nextMilestone) : null;

  const CustomTooltip = ({ active, payload, label }) => {
    if (!active || !payload || !payload.length) return null;
    const d = payload[0];
    const evts = chartData.find(c => c.year === label)?.events;
    return (
      <div style={{ background: "#FAFAF8", border: "1px solid #D6D6D0", borderRadius: 10, padding: "10px 14px", boxShadow: "0 4px 12px rgba(0,0,0,0.1)", fontSize: 12 }}>
        <div style={{ fontWeight: 700, marginBottom: 4 }}>{label}</div>
        {payload.map((p, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
            <div style={{ width: 8, height: 8, borderRadius: 4, background: p.color }} />
            <span style={{ color: "#6E6E68", textTransform: "capitalize" }}>{p.dataKey}:</span>
            <span style={{ fontWeight: 700 }}>{fmtMoney(p.value)}</span>
          </div>
        ))}
        {evts && <div style={{ marginTop: 4, fontSize: 11, color: "#005A2B", fontWeight: 600 }}>⚡ {evts}</div>}
      </div>
    );
  };

  return (
    <Card>
      <SH title="Net Worth Projection" icon="🔮" />
      {/* Current → Future */}
      <div style={{ display: "flex", justifyContent: "space-around", padding: "8px 0" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 11, color: "#6E6E68", fontWeight: 600 }}>TODAY</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: "#1A1A1A" }}>{fmtMoney(currentNW)}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", fontSize: 20, color: "#A8A8A0" }}>→</div>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 11, color: "#6E6E68", fontWeight: 600 }}>{thisYear + 30}</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: "#005A2B" }}>{fmtMoney(finalNW)}</div>
        </div>
      </div>
      {nextMilestone && yearsToMilestone !== null && yearsToMilestone > 0 && (
        <div style={{ textAlign: "center", fontSize: 12, color: "#005A2B", fontWeight: 600, padding: "4px 0" }}>🎯 {fmtMoney(nextMilestone)} milestone in ~{yearsToMilestone} {yearsToMilestone === 1 ? "year" : "years"}</div>
      )}

      {/* Chart */}
      <div style={{ height: 220, margin: "8px -8px 0" }}>
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={chartData} margin={{ top: 5, right: 10, left: -10, bottom: 0 }}>
            <defs>
              <linearGradient id="gBase" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#005A2B" stopOpacity={0.3} /><stop offset="100%" stopColor="#005A2B" stopOpacity={0.02} /></linearGradient>
              <linearGradient id="gOpt" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#2E8B57" stopOpacity={0.15} /><stop offset="100%" stopColor="#2E8B57" stopOpacity={0.01} /></linearGradient>
              <linearGradient id="gCons" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#A85B36" stopOpacity={0.15} /><stop offset="100%" stopColor="#A85B36" stopOpacity={0.01} /></linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#D6D6D0" />
            <XAxis dataKey="year" tick={{ fontSize: 10, fill: "#6E6E68" }} tickLine={false} axisLine={false} interval={4} />
            <YAxis tick={{ fontSize: 10, fill: "#6E6E68" }} tickLine={false} axisLine={false} tickFormatter={v => v >= 1000000 ? (v / 1000000).toFixed(1) + "M" : v >= 1000 ? (v / 1000).toFixed(0) + "K" : v} />
            <Tooltip content={<CustomTooltip />} />
            {scenario === "all" || scenario === "optimistic" ? <Area type="monotone" dataKey="optimistic" stroke="#2E8B57" strokeWidth={1.5} fill="url(#gOpt)" strokeDasharray="4 4" dot={false} /> : null}
            {scenario === "all" || scenario === "conservative" ? <Area type="monotone" dataKey="conservative" stroke="#A85B36" strokeWidth={1.5} fill="url(#gCons)" strokeDasharray="4 4" dot={false} /> : null}
            <Area type="monotone" dataKey="base" stroke="#005A2B" strokeWidth={2.5} fill="url(#gBase)" dot={false} />
            {events.map(ev => <ReferenceLine key={ev.id} x={String(ev.year)} stroke="#005A2B" strokeDasharray="3 3" strokeWidth={1.5} />)}
          </AreaChart>
        </ResponsiveContainer>
      </div>

      {/* Scenario toggle */}
      <div style={{ display: "flex", gap: 4, justifyContent: "center", padding: "4px 0" }}>
        {[{ k: "base", label: "Base", c: "#005A2B" }, { k: "all", label: "All Scenarios", c: "#555" }, { k: "conservative", label: "Conservative", c: "#A85B36" }, { k: "optimistic", label: "Optimistic", c: "#2E8B57" }].map(s => (
          <button key={s.k} onClick={() => setScenario(s.k)} style={{ background: scenario === s.k ? s.c + "18" : "transparent", color: scenario === s.k ? s.c : "#6E6E68", border: scenario === s.k ? "1px solid " + s.c + "40" : "1px solid #D6D6D0", borderRadius: 16, padding: "4px 10px", fontSize: 10, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>{s.label}</button>
        ))}
      </div>

      {/* Assumptions */}
      <div style={{ display: "flex", flexDirection: "column", gap: 10, background: "#EFEFEC", borderRadius: 12, padding: 14, marginTop: 4 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#6E6E68", textTransform: "uppercase", letterSpacing: 0.5 }}>Growth Rates</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {[
            { label: "📈 Investments", value: investRate, set: setInvestRate, color: "#8B7335" },
            { label: "🏡 Property", value: propRate, set: setPropRate, color: "#005A2B" },
            { label: "💵 Cash / Savings", value: cashRate, set: setCashRate, color: "#4A6B8A" },
            { label: "💳 Debt Paydown", value: debtRate, set: setDebtRate, color: "#A85B36" },
          ].map(r => (
            <div key={r.label} style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              <label style={{ fontSize: 10, color: r.color, fontWeight: 700 }}>{r.label}</label>
              <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <input type="number" value={r.value} onChange={e => r.set(parseFloat(e.target.value) || 0)} style={{ background: "#FAFAF8", border: "1.5px solid #D6D6D0", borderRadius: 8, padding: "6px 10px", fontSize: 13, fontWeight: 600, fontFamily: "inherit", outline: "none", width: "100%", boxSizing: "border-box" }} />
                <span style={{ fontSize: 12, color: "#6E6E68", fontWeight: 600 }}>%</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#6E6E68", textTransform: "uppercase", letterSpacing: 0.5, marginTop: 4 }}>Savings</div>
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 2 }}>
            <label style={{ fontSize: 10, color: "#6E6E68", fontWeight: 600 }}>Annual Savings $</label>
            <input type="number" value={annualSavings} onChange={e => setAnnualSavings(parseFloat(e.target.value) || 0)} style={{ background: "#FAFAF8", border: "1.5px solid #D6D6D0", borderRadius: 8, padding: "6px 10px", fontSize: 13, fontWeight: 600, fontFamily: "inherit", outline: "none", width: "100%", boxSizing: "border-box" }} />
          </div>
          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 2 }}>
            <label style={{ fontSize: 10, color: "#6E6E68", fontWeight: 600 }}>Savings Growth %/yr</label>
            <input type="number" value={savingsGrowth} onChange={e => setSavingsGrowth(parseFloat(e.target.value) || 0)} style={{ background: "#FAFAF8", border: "1.5px solid #D6D6D0", borderRadius: 8, padding: "6px 10px", fontSize: 13, fontWeight: 600, fontFamily: "inherit", outline: "none", width: "100%", boxSizing: "border-box" }} />
          </div>
        </div>
      </div>

      {/* Life Events */}
      <div style={{ marginTop: 4 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: 12, fontWeight: 700, color: "#3A3A3A" }}>⚡ Life Events</span>
          {!addingEvent && <Btn onClick={() => setAddingEvent(true)}>+ Add</Btn>}
        </div>
        {addingEvent && (
          <div style={{ display: "flex", flexDirection: "column", gap: 8, background: "#EFEFEC", borderRadius: 12, padding: 14, marginTop: 8 }}>
            <Inp value={evName} onChange={e => setEvName(e.target.value)} placeholder="Event (e.g. Buy House, Have Kids...)" />
            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ flex: 1 }}><Inp value={evYear} onChange={e => setEvYear(e.target.value)} placeholder="Year" type="number" /></div>
              <div style={{ flex: 1 }}><Inp value={evAmount} onChange={e => setEvAmount(e.target.value)} placeholder="Impact $ (neg for cost)" type="number" /></div>
            </div>
            <div style={{ display: "flex", gap: 8 }}><Btn onClick={addEvent} primary>Add</Btn><Btn onClick={() => setAddingEvent(false)}>Cancel</Btn></div>
          </div>
        )}
        {events.length > 0 && (
          <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 8 }}>
            {events.sort((a, b) => a.year - b.year).map(ev => (
              <div key={ev.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 10px", background: "#F7F7F5", borderRadius: 8, border: "1px solid #D6D6D0", borderLeft: "3px solid #005A2B" }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: "#005A2B", minWidth: 36 }}>{ev.year}</span>
                <span style={{ fontSize: 12, color: "#3A3A3A", flex: 1 }}>{ev.name}</span>
                <span style={{ fontSize: 11, fontWeight: 700, color: ev.amount >= 0 ? "#005A2B" : "#A85B36" }}>{ev.amount >= 0 ? "+" : ""}{fmtMoney(ev.amount)}</span>
                <button onClick={() => removeEvent(ev.id)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 12, padding: 0 }}>×</button>
              </div>
            ))}
          </div>
        )}
        {events.length === 0 && !addingEvent && <div style={{ fontSize: 11, color: "#9C9C94", fontStyle: "italic", marginTop: 4 }}>Add life events like buying a home, starting a family, or retirement to see their impact.</div>}
      </div>
    </Card>
  );
}

/* ══ TAB ICONS ══ */
const TabIcon = ({ tab, active }) => {
  const c = active ? "#005A2B" : "#505050";
  const map = {
    dashboard: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>,
    work: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={active ? "#4A4A48" : c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2L3 22h18L12 2z"/><line x1="7" y1="22" x2="17" y2="22"/></svg>,
    stonedale: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={active ? "#5C6B5E" : c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8 21l4-10 4 10"/><path d="M2 21l6-14 5 8"/><path d="M16 7l6 14"/></svg>,
    fitness: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={active ? "#A85B36" : c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 010 8h-1M6 8H5a4 4 0 000 8h1M6 12h12"/></svg>,
    house: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={active ? "#005A2B" : c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    personal: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={active ? "#4A6B8A" : c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>,
    finance: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={active ? "#8B7335" : c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>,
  };
  return map[tab] || null;
};

/* ══ MAIN APP ══ */
function CommandCenter() {
  const { data, save, loaded } = useStorage();
  const [tab, setTab] = useState("dashboard");
  const [confirmReset, setConfirmReset] = useState(false);

  if (!loaded) return <div style={{ minHeight: "100vh", background: "#1A1A1A", display: "flex", alignItems: "center", justifyContent: "center", color: "#9C9C94", fontFamily: "'DM Sans', sans-serif" }}>Loading...</div>;

  const today = new Date();
  const areaInfo = AREAS.find(a => a.key === tab);
  const headerColor = areaInfo ? areaInfo.color : "#1A1A1A";
  const tabs = [
    { key: "dashboard", label: "Home" }, { key: "work", label: "Peak" }, { key: "stonedale", label: "Stonedale" },
    { key: "fitness", label: "Fitness" }, { key: "house", label: "House" }, { key: "personal", label: "Personal" }, { key: "finance", label: "Finance" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#1A1A1A", color: "#1A1A1A", fontFamily: "'DM Sans', sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
      <div style={{ background: "#F7F7F5", borderBottom: "2px solid #005A2B", padding: "14px 20px 12px", position: "sticky", top: 0, zIndex: 10 }}>
        <div style={{ maxWidth: 600, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <h1 style={{ margin: 0, fontSize: 18, fontWeight: 900, color: headerColor, letterSpacing: "0.04em", textTransform: "uppercase" }}>
              {tab === "dashboard" ? "Command Center" : (areaInfo ? areaInfo.icon + " " + areaInfo.label : "Command Center")}
            </h1>
            <div style={{ fontSize: 11, color: "#6E6E68", marginTop: 2, fontWeight: 600, letterSpacing: "0.03em" }}>
              {today.toLocaleDateString("en-US", { weekday: "long" })}, {today.toLocaleDateString("en-US", { month: "short", day: "numeric" })}
            </div>
          </div>
          {confirmReset
            ? <div style={{ display: "flex", gap: 4, alignItems: "center" }}><span style={{ fontSize: 11, color: "#6E6E68" }}>Reset all?</span><Btn onClick={() => { save(defaultData); setConfirmReset(false); }} danger small>Yes</Btn><Btn onClick={() => setConfirmReset(false)} small>No</Btn></div>
            : <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <BackupRestore data={data} save={save} />
                <span style={{ color: "#D6D6D0" }}>|</span>
                <button onClick={() => setConfirmReset(true)} style={{ background: "none", border: "none", color: "#A8A8A0", cursor: "pointer", fontSize: 10, fontFamily: "inherit", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.05em" }}>Reset</button>
              </div>
          }
          }
        </div>
      </div>

      <BackupBanner data={data} />
      <div style={{ maxWidth: 600, margin: "0 auto", padding: "16px 16px 120px" }}>
        {tab === "dashboard" && <HomePanel data={data} save={save} setTab={setTab} />}
        {tab === "work" && <BizPanel data={data} save={save} prefix="work" color="#4A4A48" label="Peak" />}
        {tab === "stonedale" && <BizPanel data={data} save={save} prefix="sd" color="#5C6B5E" label="Stonedale" />}
        {tab === "fitness" && <FitnessPanel data={data} save={save} />}
        {tab === "house" && <HousePanel data={data} save={save} />}
        {tab === "personal" && <PersonalPanel data={data} save={save} />}
        {tab === "finance" && <FinancePanel data={data} save={save} />}
      </div>

      <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "#1A1A1A", borderTop: "2px solid #005A2B", padding: "8px 0 env(safe-area-inset-bottom, 10px)", zIndex: 20, boxShadow: "0 -2px 12px rgba(0,0,0,0.2)" }}>
        <div style={{ maxWidth: 600, margin: "0 auto", display: "flex", justifyContent: "space-around" }}>
          {tabs.map(t => {
            const ai = AREAS.find(a => a.key === t.key);
            const activeColor = ai ? ai.color : "#005A2B";
            return (
              <button key={t.key} onClick={() => setTab(t.key)} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "8px 6px", fontFamily: "inherit", minWidth: 0 }}>
                <div style={{ transform: "scale(1.3)", transformOrigin: "center" }}>
                  <TabIcon tab={t.key} active={tab === t.key} />
                </div>
                <span style={{ fontSize: 10, fontWeight: 700, color: tab === t.key ? activeColor : "#505050", marginTop: 2, textTransform: "uppercase", letterSpacing: "0.04em" }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false }; }
      static getDerivedStateFromError() { return { hasError: true }; }
      render() {
        if (this.state.hasError) return React.createElement("div", { style: { padding: 40, color: "#fff", background: "#1A1A1A", minHeight: "100vh", fontFamily: "sans-serif" } }, "Something went wrong. Try refreshing.");
        return this.props.children;
      }
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><CommandCenter /></ErrorBoundary>);
  </script>
</body>
</html>
